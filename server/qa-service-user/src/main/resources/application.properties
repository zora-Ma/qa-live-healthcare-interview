spring.application.name=qa-service-user
server.port=8080

# MySQL 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3316/qa_live_healthcare?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=qa_user
spring.datasource.password=qa123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 跨域配置
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false
spring.web.cors.max-age=3600

# Actuator 配置
# 启用所有端点
management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers
# 显示详细的健康信息
management.endpoint.health.show-details=always
# 启用健康检查组件
management.endpoint.health.show-components=always
# 自定义管理端点基础路径（可选）
management.endpoints.web.base-path=/actuator
# 启用 info 端点的贡献者
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# 应用信息配置
info.app.name=qa-service-user
info.app.description=QA Service User - Healthcare QA System User Management Service
info.app.version=0.0.1-SNAPSHOT
info.app.encoding=UTF-8
info.app.java.version=17
info.team=QA Healthcare Team
info.environment=development
info.build.timestamp=${BUILD_TIME:2025-11-03}
info.features=CORS,Actuator,Health Checks,User Management
